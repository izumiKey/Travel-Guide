function haversine(lat1,ln1,lat2,ln2){
  var R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(ln2-ln1)*Math.PI/180;
  var a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function getDist(id){if(!userPos)return null;var s=shops[id];if(!s||!s.lat)return null;if(distCache[id]!==undefined)return distCache[id];var km=haversine(userPos.lat,userPos.lng,s.lat,s.lng);distCache[id]=km;return km}
function fmtDist(km){if(km===null)return'';if(km<.2)return Math.round(km*1000)+'m';return km.toFixed(1)+'km'}
function distCls(km){if(km===null)return'';if(km<1)return'near';if(km>10)return'far';return''}
function distBadgeHtml(id){var km=getDist(id);if(km===null)return'';return'<span class="dist-badge '+distCls(km)+'">'+fmtDist(km)+'</span>'}

function initGeo(){try{if(!navigator.geolocation)return;navigator.geolocation.getCurrentPosition(function(pos){userPos={lat:pos.coords.latitude,lng:pos.coords.longitude};refreshDist()},function(){},{enableHighAccuracy:true,timeout:10000,maximumAge:300000})}catch(e){console.log("geo err:",e.message)}}function setLocation(lat,lng,label){userPos={lat:lat,lng:lng};distCache={};refreshDist();console.log("Location set to",label)}

var pageScrolls={},currentPage='planA';

  document.querySelectorAll('nav a').forEach(function(a){a.classList.remove('active')});
