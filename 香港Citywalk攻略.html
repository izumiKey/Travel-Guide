<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>香港Citywalk一日游攻略 | 珠海出发</title>
<style>
:root {
  --bg: #faf9f6;
  --card: #fff;
  --text: #2c2c2c;
  --muted: #888;
  --accent: #e65c41;
  --accent2: #3b7dd8;
  --accent3: #2ca089;
  --accent4: #d4842c;
  --border: #e8e5e0;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --radius: 10px;
  --nav-width: 220px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.6;
  display: flex; min-height: 100vh;
}

/* ── Sidebar ── */
nav {
  width: var(--nav-width); background: #1e1e24; color: #e0e0e0;
  position: fixed; top:0; left:0; height:100vh;
  padding: 24px 0; overflow-y: auto; z-index: 100;
  display: flex; flex-direction: column;
}
nav .logo {
  font-size: 15px; font-weight: 700; padding: 0 20px 20px;
  border-bottom: 1px solid rgba(255,255,255,.1); margin-bottom: 8px;
  letter-spacing: .5px;
}
nav .logo span { color: var(--accent); }
nav a {
  display: block; padding: 10px 20px; color: #aaa; text-decoration: none;
  font-size: 13px; border-left: 3px solid transparent; transition: .15s;
}
nav a:hover { color:#fff; background: rgba(255,255,255,.05); }
nav a.active { color:#fff; border-left-color: var(--accent); background: rgba(255,255,255,.08); }
nav .section { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #666; padding: 18px 20px 6px; }

/* ── Main ── */
main { margin-left: var(--nav-width); flex: 1; padding: 32px 40px; max-width: 960px; }
.page { display: none; }
.page.active { display: block; }

h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
h2 { font-size: 18px; font-weight: 600; margin: 28px 0 12px; }
h3 { font-size: 15px; font-weight: 600; margin: 20px 0 8px; }
.subtitle { color: var(--muted); font-size: 13px; margin-bottom: 20px; }

/* ── Cards ── */
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px 20px; margin-bottom: 14px;
  box-shadow: var(--shadow); cursor: pointer; transition: .15s;
}
.card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.1); transform: translateY(-1px); }
.card .name { font-weight: 600; font-size: 15px; }
.card .meta { font-size: 12px; color: var(--muted); margin-top: 4px; display: flex; gap: 12px; flex-wrap: wrap; }
.card .short { font-size: 13px; margin-top: 6px; color: #555; }
.tag {
  display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px;
  font-weight: 500;
}
.tag-food { background: #fff0ed; color: #e65c41; }
.tag-cafe { background: #f0effc; color: #6c5ce7; }
.tag-shop { background: #edf7f4; color: #2ca089; }
.tag-spot { background: #fef7ed; color: #d4842c; }
.tag-dinner { background: #edeff7; color: #3b7dd8; }

/* ── Timeline ── */
.timeline { position:relative; padding-left:28px; }
.timeline::before {
  content:''; position:absolute; left:11px; top:4px; bottom:4px;
  width:2px; background: var(--border); border-radius:1px;
}
.timeline-item {
  position:relative; margin-bottom:18px; padding:12px 16px;
  background: var(--card); border:1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow);
}
.timeline-item::before {
  content:''; position:absolute; left:-22px; top:18px;
  width:10px; height:10px; border-radius:50%;
  border: 2px solid var(--accent); background: var(--bg);
}
.timeline-item.transit::before { border-color: var(--muted); }
.timeline-item .time { font-size: 11px; color: var(--muted); font-weight: 600; }
.timeline-item .what { font-weight: 600; font-size: 14px; }
.timeline-item .detail { font-size: 12px; color: #666; margin-top: 2px; }

/* ── Modal ── */
.modal-overlay {
  display:none; position:fixed; top:0; left:0; width:100%; height:100%;
  background: rgba(0,0,0,.45); z-index: 999; justify-content:center; align-items:center;
}
.modal-overlay.show { display:flex; }
.modal {
  background: var(--card); border-radius: 14px; max-width: 560px; width: 90%;
  max-height: 85vh; overflow-y: auto; box-shadow: 0 8px 30px rgba(0,0,0,.18);
}
.modal .img { width:100%; height:200px; background:#f0ede8; object-fit:cover; border-radius:14px 14px 0 0; }
.modal .body { padding: 20px 24px 24px; }
.modal .close {
  float:right; background:none; border:none; font-size:22px; cursor:pointer;
  color: var(--muted); padding:4px 8px; line-height:1;
}
.modal h3 { margin-top:0; }
.modal .info-row { display:flex; gap:16px; flex-wrap:wrap; font-size:12px; color:var(--muted); margin:8px 0; }
.modal .info-row span { display:flex; align-items:center; gap:4px; }
.modal .desc { font-size:13px; margin:10px 0; color:#444; }
.modal .must-try { font-size:13px; color:var(--accent); font-weight:500; }
.modal .gallery { display:flex; gap:8px; margin-top:12px; overflow-x:auto; }
.modal .gallery img { height:100px; border-radius:8px; background:#f0ede8; object-fit:cover; }

/* ── Platform Links ── */
.platform-links { display:flex; gap:10px; margin-top:14px; flex-wrap:wrap; }
.platform-links a {
  display:inline-flex; align-items:center; gap:5px; padding:7px 14px;
  border-radius:20px; font-size:12px; font-weight:500; text-decoration:none;
  transition:.15s; border:1px solid transparent;
}
.platform-links a:hover { transform:translateY(-1px); }
.platform-links a.or { background:#fff5f0; color:#e65c41; border-color:#fdd8cc; }
.platform-links a.or:hover { background:#fde8df; }
.platform-links a.xhs { background:#fff0f5; color:#ff2448; border-color:#ffccd5; }
.platform-links a.xhs:hover { background:#ffe0e8; }
.platform-links a.dp { background:#fffdf0; color:#f5a623; border-color:#ffe8a0; }
.platform-links a.dp:hover { background:#fff8d0; }
.card-links { display:inline-flex; gap:4px; margin-left:8px; }
.card-links a { font-size:10px; padding:1px 6px; border-radius:10px; text-decoration:none; opacity:.7; }
.card-links a:hover { opacity:1; }

/* ── Distance Badge ── */
.dist-badge {
  position: absolute; top: 8px; right: 12px;
  font-size: 11px; font-weight: 600; padding: 3px 10px;
  border-radius: 14px; background: #eef6ff; color: #3b7dd8;
  white-space: nowrap;
}
.dist-badge.near { background: #e8f5e9; color: #2ca089; }
.dist-badge.far { background: #f5f0ff; color: #7c4dff; }
.timeline-item, .card { position: relative; }

/* ── Responsive ── */
@media (max-width: 768px) {
  body { flex-direction:column; }
  nav {
    position:relative; width:100%; height:auto; flex-direction:row;
    flex-wrap:wrap; padding:12px; gap:2px; overflow-x:auto;
  }
  nav .logo, nav .section { display:none; }
  nav a { padding:6px 12px; font-size:12px; border-left:none; border-bottom:2px solid transparent; white-space:nowrap; }
  nav a.active { border-left:none; border-bottom-color:var(--accent); }
  main { margin-left:0; padding:20px 16px; }
  .modal { max-width:95vw; }
}
</style>
</head>

function renderRoute(routeKey) {
  const r = routes[routeKey];
  let h = `<h1>${r.title}</h1><p class="subtitle">${r.subtitle}</p>`;
  h += '<div class="timeline">';
  r.timeline.forEach(item => {
    const cls = item.transit ? 'timeline-item transit' : 'timeline-item';
    const clickable = item.shop ? ' onclick="openModal(\''+item.shop+'\')" style="cursor:pointer"' : '';
    h += `<div class="${cls}"${clickable}>`;
    h += `<div class="time">${item.t} ${item.shop ? '<span class="dist-badge-dynamic" data-shop="'+item.shop+'">'+(getDist(item.shop)?formatDist(getDist(item.shop)):'')+'</span>' : ''}</div>`;
    h += `<div class="what">${item.w}</div>`;
    if(item.d) h += `<div class="detail">${item.d}</div>`;
    h += '</div>';
  });
  h += '</div>';
  return h;
}

//  MODAL

// ═══════════════════════════════════════
//  DISTANCE
// ═══════════════════════════════════════
let userPos = null;
let distCache = {};

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function getDist(shopId) {
  if (!userPos) return null;
  const s = shops[shopId];
  if (!s || !s.lat) return null;
  if (distCache[shopId] !== undefined) return distCache[shopId];
  const km = haversine(userPos.lat, userPos.lng, s.lat, s.lng);
  distCache[shopId] = km;
  return km;
}

function formatDist(km) {
  if (km === null || km === undefined) return '';
  if (km < 0.2) return Math.round(km*1000)+'m';
  return km.toFixed(1)+'km';
}

function distClass(km) {
  if (km === null || km === undefined) return '';
  if (km < 1) return 'near';
  if (km > 10) return 'far';
  return '';
}

function distBadge(shopId) {
  const km = getDist(shopId);
  if (km === null) return '';
  return '<span class="dist-badge '+distClass(km)+'">'+formatDist(km)+'</span>';
}

function refreshDistances() {
  distCache = {};
  document.querySelectorAll('.dist-badge-dynamic').forEach(el => {
    const id = el.dataset.shop;
    const km = getDist(id);
    if (km !== null) {
      el.textContent = formatDist(km);
      el.className = 'dist-badge dist-badge-dynamic ' + distClass(km);
    }
  });
}

function initGeolocation() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(
    pos => {
      userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      refreshDistances();
    },
    err => { console.log('Geolocation unavailable:', err.message); },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 300000 }
  );
}


function isMobile() {
  return /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent);
}

function xhsLink(keyword) {
  const kw = encodeURIComponent(keyword + ' 香港');
  const web = 'https://www.xiaohongshu.com/search_result?keyword=' + kw + '&type=51';
  const app = 'xhsdiscover://search/result?keyword=' + kw;
  if (isMobile()) {
    // Try app first, fallback to web after 2s
    return 'javascript:(function(){var w=window.open("'+app+'");setTimeout(function(){if(!document.hidden)window.location="'+web+'"},1500);})()';
  }
  return web;
}

function dpLink(keyword) {
  const kw = encodeURIComponent(keyword + ' 香港');
  const web = 'https://www.dianping.com/search/keyword/8/0_' + kw;
  const app = 'dianping://search?keyword=' + kw;
  if (isMobile()) {
    return 'javascript:(function(){var w=window.open("'+app+'");setTimeout(function(){if(!document.hidden)window.location="'+web+'"},1500);})()';
  }
  return web;
}

function platformLinks(shopName) {
  return '<div class="platform-links">' +
    '<a class="or" href="https://www.openrice.com/zh/hongkong/restaurants?what=' + encodeURIComponent(shopName + ' 香港') + '" target="_blank">🔍 OpenRice 搜索</a>' +
    '<a class="xhs" href="' + xhsLink(shopName) + '">📕 小红书 搜索</a>' +
    '<a class="dp" href="' + dpLink(shopName) + '">⭐ 大众点评 搜索</a>' +
    '</div>';
}

function openModal(shopId) {
  const s = shops[shopId];
  if(!s) return;
  let imgsHtml = s.imgs ? s.imgs.map(u => `<img src="${u}" alt="${shopId}" onerror="this.style.display='none'">`).join('') : '';

  const tagColors = {food:'tag-food',cafe:'tag-cafe',shop:'tag-shop',spot:'tag-spot',dinner:'tag-dinner'};
  document.getElementById('modalBox').innerHTML = `
    <div class="body">
      <button class="close" onclick="closeModal()">✕</button>
      <h3>${shopId} <span class="tag ${tagColors[s.tag]||'tag-food'}">${s.cuisine||''}</span></h3>
      <div class="info-row">
        <span>📍 ${s.addr}</span><span>🕐 ${s.time}</span><span>💰 ${s.price}</span>${getDist(shopId)!==null?'<span>📏 距你 '+formatDist(getDist(shopId))+'</span>':''}
      </div>
      <div class="info-row">
        <span>🪑 空调：${s.ac}</span><span>💺 可坐：${s.sit}</span>
      </div>
      <div class="desc">${s.desc}</div>
      ${s.must ? '<div class="must-try">✨ 必试：'+s.must+'</div>' : ''}
      ${imgsHtml ? '<div class="gallery">'+imgsHtml+'</div>' : ''}${platformLinks(shopId)}
    </div>`;
  document.getElementById('modalOverlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  document.body.style.overflow = '';
}

// ═══════════════════════════════════════
//  PAGE SWITCHING
// ═══════════════════════════════════════
function switchPage(pageId, el) {
  document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
  if(el) el.classList.add('active');

  const main = document.getElementById('mainContent');
  switch(pageId) {
    case 'planA': main.innerHTML = renderRoute('planA'); break;
    case 'planB3': main.innerHTML = renderRoute('planB3'); break;
    case 'planB1': main.innerHTML = renderRoute('planB1'); break;
    case 'planB2': main.innerHTML = renderRoute('planB2'); break;
    case 'dirKowloon':
      main.innerHTML = renderShopDir([
        "金泰沙冰","彩虹","隆姐泰国美食馆","BTS美食站","黄珍珍泰国菜馆","金宝泰国菜馆",
        "昭拍耶","泰金国","泰发泰国餐厅","大和堂","南角","地茂馆甜品","合成糖水",
        "清真牛肉馆","九龙寨城光影展","九龙寨城公园"
      ], '九龙城店铺全览');
      break;
    case 'dirShamshuipo':
      main.innerHTML = renderShopDir([
        "合益泰小食","公和豆品厂","坤记糕品","汉发面家","文记车仔面","新香园坚记",
        "Café Sausalito","顺流精品咖啡","文化屋杂货店","White Noise Records",
        "阿里皮艺","DX设计馆","美荷楼","嘉顿山"
      ], '深水埗店铺全览');
      break;
    case 'dirOther':
      main.innerHTML = renderShopDir([
        "重庆大厦","新德里餐厅","K11 MUSEA","肥姐小食店","弥敦道金铺",
        "中港城码头","港珠澳大桥口岸","Lonely Paisley","德丰打冷","周记油渣面",
        "捌哥捌哥","月桥正宗越南汤粉","苏山鸡饭","缘潮味"
      ], '尖沙咀·旺角·晚餐');
      break;
    case 'info': main.innerHTML = renderInfo(); break;
  }
  window.scrollTo(0,0); initGeolocation();
}

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
switchPage('planA', document.querySelector('nav a[href="#planA"]'));
</script>
