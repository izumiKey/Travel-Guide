:root{--bg:#faf9f6;--card:#fff;--text:#2c2c2c;--muted:#888;--accent:#e65c41;--border:#e8e5e0;--shadow:0 1px 3px rgba(0,0,0,.06);--radius:10px;--nav-w:220px}

nav .logo span{color:var(--accent)}
nav a{display:block;padding:10px 20px;color:#aaa;text-decoration:none;font-size:13px;border-left:3px solid transparent;transition:.15s}
nav a:hover{color:#fff;background:rgba(255,255,255,.05)}
nav a.active{color:#fff;border-left-color:var(--accent);background:rgba(255,255,255,.08)}
nav .section{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#666;padding:18px 20px 6px}
main{margin-left:var(--nav-w);flex:1;padding:32px 40px;max-width:960px}
h1{font-size:24px;font-weight:700;margin-bottom:4px}
h2{font-size:18px;font-weight:600;margin:28px 0 12px}
h3{font-size:15px;font-weight:600;margin:20px 0 8px}
.subtitle{color:var(--muted);font-size:13px;margin-bottom:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:14px;box-shadow:var(--shadow);cursor:pointer;transition:.15s;position:relative}
.card:hover{box-shadow:0 2px 8px rgba(0,0,0,.1);transform:translateY(-1px)}
.card .name{font-weight:600;font-size:15px}
.card .meta{font-size:12px;color:var(--muted);margin-top:4px;display:flex;gap:12px;flex-wrap:wrap}

.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500}

.tag-spot{background:#fef7ed;color:#d4842c}
.tag-dinner{background:#edeff7;color:#3b7dd8}
.timeline{position:relative;padding-left:28px}
.timeline::before{content:'';position:absolute;left:11px;top:4px;bottom:4px;width:2px;background:var(--border);border-radius:1px}
.timeline-item{position:relative;margin-bottom:18px;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}

.timeline-item.transit::before{border-color:var(--muted)}
.timeline-item .time{font-size:11px;color:var(--muted);font-weight:600}
.timeline-item .what{font-weight:600;font-size:14px}
.timeline-item .detail{font-size:12px;color:#666;margin-top:2px}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);z-index:999;justify-content:center;align-items:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:14px;max-width:560px;width:90%;max-height:85vh;overflow-y:auto;box-shadow:0 8px 30px rgba(0,0,0,.18)}
.modal .body{padding:20px 24px 24px}
.modal .close{float:right;background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);padding:4px 8px;line-height:1}
.modal h3{margin-top:0}

.modal .gallery img{height:100px;border-radius:8px;background:#f0ede8;object-fit:cover}
.dist-badge{position:absolute;top:8px;right:12px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:14px;background:#eef6ff;color:#3b7dd8;white-space:nowrap}
.dist-badge.near{background:#e8f5e9;color:#2ca089}
.dist-badge.far{background:#f5f0ff;color:#7c4dff}
.tl-dot{position:absolute;left:-22px;top:14px;width:18px;height:18px;border-radius:50%;background:var(--bg);border:2px solid var(--accent);cursor:pointer;z-index:2;display:flex;align-items:center;justify-content:center;font-size:10px;line-height:1;color:transparent;transition:.15s}.tl-dot.checked{background:var(--accent);color:#fff}.tl-dot.checked::after{content:'✓'}.timeline-item.checked{opacity:.5}.timeline-item.checked:hover{opacity:.7}.card.checked{opacity:.45}.card.checked:hover{opacity:.65}.platform-links{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}

.platform-links a:hover{transform:translateY(-1px)}
.platform-links a.or{background:#fff5f0;color:#e65c41;border-color:#fdd8cc}
.platform-links a.xhs{background:#fff0f5;color:#ff2448;border-color:#ffccd5}
.platform-links a.dp{background:#fffdf0;color:#f5a623;border-color:#ffe8a0}
.card-links{display:inline-flex;gap:4px;margin-left:8px}

.card-links a:hover{opacity:1}
@media (max-width:768px){body{flex-direction:column}nav{position:sticky;top:0;width:100%;height:auto;flex-direction:row;flex-wrap:wrap;padding:8px 12px;gap:2px;overflow-x:auto;overflow-y:hidden;max-height:200px;background:#1e1e24;box-shadow:0 1px 4px rgba(0,0,0,.2)}nav .logo,nav .section{display:none}nav a{padding:6px 12px;font-size:12px;border-left:none;border-bottom:2px solid transparent;white-space:nowrap;border-radius:4px;}nav a.active{border-left:none;border-bottom-color:var(--accent)}nav.collapsed{max-height:36px;padding:3px 8px;flex-wrap:nowrap;overflow:hidden}nav.collapsed a{display:none}nav.collapsed a.active{display:inline-block;font-size:12px;padding:3px 10px}nav.collapsed::after{content:' ▾';font-size:12px;color:#999;padding:3px 4px;cursor:pointer;white-space:nowrap;flex-shrink:0}main{margin-left:0;padding:20px 16px}.modal{max-width:95vw}}

});}catch(e){console.log("click handler err:",e.message)}

function haversine(lat1,ln1,lat2,ln2){
  var R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(ln2-ln1)*Math.PI/180;
  var a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function getDist(id){if(!userPos)return null;var s=shops[id];if(!s||!s.lat)return null;if(distCache[id]!==undefined)return distCache[id];var km=haversine(userPos.lat,userPos.lng,s.lat,s.lng);distCache[id]=km;return km}
function fmtDist(km){if(km===null)return'';if(km<.2)return Math.round(km*1000)+'m';return km.toFixed(1)+'km'}
function distCls(km){if(km===null)return'';if(km<1)return'near';if(km>10)return'far';return''}
function distBadgeHtml(id){var km=getDist(id);if(km===null)return'';return'<span class="dist-badge '+distCls(km)+'">'+fmtDist(km)+'</span>'}
function refreshDist(){distCache={};document.querySelectorAll('.dist-badge-dynamic').forEach(function(el){var km=getDist(el.dataset.shop);if(km!==null){el.textContent=fmtDist(km);el.className='dist-badge dist-badge-dynamic '+distCls(km)}})}
function initGeo(){try{if(!navigator.geolocation)return;navigator.geolocation.getCurrentPosition(function(pos){userPos={lat:pos.coords.latitude,lng:pos.coords.longitude};refreshDist()},function(){},{enableHighAccuracy:true,timeout:10000,maximumAge:300000})}catch(e){console.log("geo err:",e.message)}}function setLocation(lat,lng,label){userPos={lat:lat,lng:lng};distCache={};refreshDist();console.log("Location set to",label)}

// Modal
function openModal(id){
  var s=shops[id];if(!s)return;
  var tags={food:'tag-food',cafe:'tag-cafe',shop:'tag-shop',spot:'tag-spot',dinner:'tag-dinner'};
  var d=getDist(id),distHtml=d!==null?'<span>📏 距你 '+fmtDist(d)+'</span>':'';
  var imgs=s.imgs?s.imgs.map(function(u){return'<img src="'+u+'" alt="'+id+'" onerror="this.style.display=\'none\'">'}).join(''):'';
  document.getElementById('modalBox').innerHTML='<div class="body"><button class="close" onclick="closeModal()">✕</button><h3><span class="modal-check'+(checklist[id]?' checked':'')+'" data-shop="'+id+'" onclick="event.stopPropagation();toggleCheck(\''+id+'\',this);refreshAllChecks()" style="cursor:pointer;display:inline-block;width:22px;height:22px;line-height:22px;text-align:center;border-radius:50%;border:2px solid '+(checklist[id]?'var(--accent)':'#ccc')+';background:'+(checklist[id]?'var(--accent)':'transparent')+';color:#fff;font-size:12px;margin-right:4px;vertical-align:middle">'+(checklist[id]?'✓':'')+'</span>'+id+' <span class="tag '+tags[s.tag]+'">'+s.cuisine+'</span></h3><div class="info-row"><span>📍 '+s.addr+'</span><span>🕐 '+s.time+'</span><span>💰 '+s.price+'</span>'+distHtml+'</div><div class="info-row"><span>🪑 空调：'+s.ac+'</span><span>💺 可坐：'+s.sit+'</span></div><div class="desc">'+s.desc+'</div>'+(s.must?'<div class="must-try">✨ 必试：'+s.must+'</div>':'')+(imgs?'<div class="gallery">'+imgs+'</div>':'')+platLinks(id)+'</div>';
  window._modalOpen=true;var _sy=window.pageYOffset||document.documentElement.scrollTop;document.getElementById('modalOverlay').classList.add('show');document.body.style.overflow='hidden';document.body.style.position='fixed';document.body.style.top='-'+_sy+'px';document.body.style.width='100%';document.body.dataset.scrollY=_sy;
}
function closeModal(){window._modalOpen=false;document.getElementById('modalOverlay').classList.remove('show');document.body.style.overflow='auto';document.body.style.position='';document.body.style.top='';document.body.style.width='';var _sy=parseInt(document.body.dataset.scrollY)||0;document.body.dataset.scrollY='';window.scrollTo(0,_sy);if(window._resetScroll)window._resetScroll()}

// Page switching with scroll position memory
var pageScrolls={},currentPage='planA';
function switchPage(id,el){
  document.querySelectorAll('nav a').forEach(function(a){a.classList.remove('active')});
  if(el)el.classList.add('active');
  var m=document.getElementById('mainContent');
  pageScrolls[currentPage]=window.pageYOffset||document.documentElement.scrollTop;
  if(id==='planA')m.innerHTML=renderRoute('planA');
  else if(id==='planB3')m.innerHTML=renderRoute('planB3');
  else if(id==='planB1')m.innerHTML=renderRoute('planB1');
  else if(id==='planB2')m.innerHTML=renderRoute('planB2');
  else if(id==='dirKowloon')m.innerHTML=renderDir(["金泰沙冰","彩虹","隆姐泰国美食馆","BTS美食站","黄珍珍泰国菜馆","金宝泰国菜馆","昭拍耶","泰金国","泰发泰国餐厅","大和堂","南角","地茂馆甜品","合成糖水","清真牛肉馆","九龙寨城光影展","九龙寨城公园"],'九龙城店铺全览');
  else if(id==='dirShamshuipo')m.innerHTML=renderDir(["合益泰小食","公和豆品厂","坤记糕品","汉发面家","文记车仔面","新香园坚记","Café Sausalito","顺流精品咖啡","文化屋杂货店","White Noise Records","阿里皮艺","DX设计馆","美荷楼","嘉顿山"],'深水埗店铺全览');
  else if(id==='dirOther')m.innerHTML=renderDir(["重庆大厦","新德里餐厅","K11 MUSEA","肥姐小食店","弥敦道金铺","中港城码头","港珠澳大桥口岸","Lonely Paisley","德丰打冷","周记油渣面","捌哥捌哥","月桥正宗越南汤粉","苏山鸡饭","缘潮味"],'尖沙咀·旺角·晚餐');
  else if(id==='info')m.innerHTML=renderInfo();
  currentPage=id;
  setTimeout(function(){window.scrollTo(0,pageScrolls[id]||0);setTimeout(refreshAllChecks,100)},50);
  initGeo();
}

// Init
document.addEventListener("DOMContentLoaded",function(){try{switchPage('planA',document.querySelector('nav a[href="#planA"]'));}catch(e){console.log("init err:",e.message)}});
// Mobile nav collapse on scroll
(function(){var ls=0,mx=0,th=0,nav=null;function onScroll(){if(window._modalOpen)return;if(!nav)nav=document.querySelector('nav');if(!nav||window.innerWidth>768)return;var st=window.pageYOffset||document.documentElement.scrollTop;if(st===ls)return;if(st>mx)mx=st;ls=st;var now=Date.now();if(now-th<60)return;th=now;if(st<=20){nav.classList.remove('collapsed');mx=st}else if(st>60&&st>=mx-5){nav.classList.add('collapsed')}else if(st<mx-35){nav.classList.remove('collapsed');mx=st}}window.addEventListener('scroll',onScroll,{passive:true});window._resetScroll=function(){ls=0;mx=0}})();</script>
