function haversine(lat1,ln1,lat2,ln2){
  var R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(ln2-ln1)*Math.PI/180;
  var a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function fmtDist(km){if(km===null)return'';if(km<.2)return Math.round(km*1000)+'m';return km.toFixed(1)+'km'}
function distCls(km){if(km===null)return'';if(km<1)return'near';if(km>10)return'far';return''}
function distBadgeHtml(id){var km=getDist(id);if(km===null)return'';return'<span class="dist-badge '+distCls(km)+'">'+fmtDist(km)+'</span>'}

function linkDP(name){return'https://www.dianping.com/search/keyword/341/0_'+encodeURIComponent(name)}
function schemeXHS(name){return'xhsdiscover://search/result?keyword='+encodeURIComponent(name+' 香港')}

function platLinks(name){return'<div class="platform-links"><a class="or" href="https://www.openrice.com/zh/hongkong/restaurants?what='+encodeURIComponent(s2t(name))+'" target="_blank">🔍 OpenRice 搜索</a><a class="xhs" href="'+linkXHS(name)+'" data-scheme="'+schemeXHS(name)+'" target="_blank">📕 小红书 搜索</a><a class="dp" href="'+linkDP(name)+'" data-scheme="'+schemeDP(name)+'" target="_blank">⭐ 大众点评 搜索</a></div>'}

// Render
function renderRoute(k){var _rid=k;
  var r=routes[k],h='<h1>'+r.title+'</h1><p class="subtitle">'+r.sub+'</p><div class="timeline">';
  r.items.forEach(function(it){
    var isHdr=!it.tr&&!it.shop,cls=it.tr?'timeline-item transit':isHdr?'timeline-item section-header':'timeline-item';
    var click=it.shop?" onclick=\"openModal('"+it.shop+"')\" style=\"cursor:pointer\"":"";
    if(isHdr){h+='<div class="'+cls+'"><div class="what">'+it.w+'</div>';if(it.d)h+='<div class="detail">'+it.d+'</div>';h+='</div>'}else{
    var cid=it.shop||('_item_'+it.t+'_'+it.w.replace(/[^a-zA-Z0-9\u4e00-\u9fff]/g,'').substring(0,30));h+='<div class="'+cls+'" data-shop="'+cid+'"'+click+'>'+'<span class="tl-dot'+(checklist[cid]?' checked':'')+'" data-shop="'+cid+'" onclick="event.stopPropagation();toggleCheck(\''+cid+'\',this)"></span>';
    h+='<div class="time">'+it.t;
    if(it.shop){var d=getDist(it.shop);h+=' <span class="dist-badge-dynamic" data-shop="'+it.shop+'">'+(d!==null?fmtDist(d):'')+'</span>'}
    h+='</div><div class="what">'+it.w+'</div>';
    if(it.d)h+='<div class="detail">'+it.d+'</div>';
    h+='</div>';}
  });
  return h+'</div>';
}
function renderDir(list,title){
  var h='<h1>'+title+'</h1><p class="subtitle">点击卡片查看详情</p>';
  var types={food:'🍜 美食',cafe:'☕ 咖啡·甜品',shop:'🛍️ 特色店铺',spot:'📍 景点·交通',dinner:'🍽️ 晚餐'};
  var byType={};
  list.forEach(function(id){var s=shops[id];if(!s)return;var t=s.tag;if(!byType[t])byType[t]=[];byType[t].push(id)});
  for(var t in byType){
    h+='<h3>'+types[t]+'</h3>';
    byType[t].forEach(function(id){
      var s=shops[id],d=getDist(id);
      var orU='https://www.openrice.com/zh/hongkong/restaurants?what='+encodeURIComponent(s2t(id));
      var xhsU=linkXHS(id),dpU=linkDP(id),xhsS=schemeXHS(id),dpS=schemeDP(id);
      h+='<div class="card'+(checklist[id]?' checked':'')+'" data-shop="'+id+'" onclick="openModal(\''+id+'\')">';
      h+='<span class="dist-badge dist-badge-dynamic" data-shop="'+id+'" style="'+(d!==null?'':'display:none')+'">'+(d!==null?fmtDist(d):'')+'</span>';
      h+='<div class="name">'+id+' <span class="tag tag-'+s.tag+'">'+s.cuisine+'</span>';
      h+='<span class="card-links"><a class="or" href="'+orU+'" target="_blank" onclick="event.stopPropagation()" title="OpenRice">🍽️</a><a class="xhs" href="'+xhsU+'" data-scheme="'+xhsS+'" target="_blank" onclick="event.stopPropagation()" title="小红书">📕</a><a class="dp" href="'+dpU+'" data-scheme="'+dpS+'" target="_blank" onclick="event.stopPropagation()" title="大众点评">⭐</a></span></div>';
      h+='<div class="meta"><span>📍 '+s.addr+'</span><span>💰 '+s.price+'</span><span>🪑 '+s.ac+'</span></div>';
      h+='<div class="short">'+s.desc.substring(0,100)+'...</div></div>';
    });
  };
  return h;
}

// Modal
function openModal(id){
  var s=shops[id];if(!s)return;
  var tags={food:'tag-food',cafe:'tag-cafe',shop:'tag-shop',spot:'tag-spot',dinner:'tag-dinner'};
  var d=getDist(id),distHtml=d!==null?'<span>📏 距你 '+fmtDist(d)+'</span>':'';
  var imgs=s.imgs?s.imgs.map(function(u){return'<img src="'+u+'" alt="'+id+'" onerror="this.style.display=\'none\'">'}).join(''):'';
  document.getElementById('modalBox').innerHTML='<div class="body"><button class="close" onclick="closeModal()">✕</button><h3><span class="modal-check'+(checklist[id]?' checked':'')+'" data-shop="'+id+'" onclick="event.stopPropagation();toggleCheck(\''+id+'\',this);refreshAllChecks()" style="cursor:pointer;display:inline-block;width:22px;height:22px;line-height:22px;text-align:center;border-radius:50%;border:2px solid '+(checklist[id]?'var(--accent)':'#ccc')+';background:'+(checklist[id]?'var(--accent)':'transparent')+';color:#fff;font-size:12px;margin-right:4px;vertical-align:middle">'+(checklist[id]?'✓':'')+'</span>'+id+' <span class="tag '+tags[s.tag]+'">'+s.cuisine+'</span></h3><div class="info-row"><span>📍 '+s.addr+'</span><span>🕐 '+s.time+'</span><span>💰 '+s.price+'</span>'+distHtml+'</div><div class="info-row"><span>🪑 空调：'+s.ac+'</span><span>💺 可坐：'+s.sit+'</span></div><div class="desc">'+s.desc+'</div>'+(s.must?'<div class="must-try">✨ 必试：'+s.must+'</div>':'')+(imgs?'<div class="gallery">'+imgs+'</div>':'')+platLinks(id)+'</div>';
  window._modalOpen=true;var _sy=window.pageYOffset||document.documentElement.scrollTop;document.getElementById('modalOverlay').classList.add('show');document.body.style.overflow='hidden';document.body.style.position='fixed';document.body.style.top='-'+_sy+'px';document.body.style.width='100%';document.body.dataset.scrollY=_sy;
}
function closeModal(){window._modalOpen=false;document.getElementById('modalOverlay').classList.remove('show');document.body.style.overflow='auto';document.body.style.position='';document.body.style.top='';document.body.style.width='';var _sy=parseInt(document.body.dataset.scrollY)||0;document.body.dataset.scrollY='';window.scrollTo(0,_sy);if(window._resetScroll)window._resetScroll()}

// Page switching with scroll position memory
var pageScrolls={},currentPage='main';
function switchPage(id,el){
  document.querySelectorAll('nav a').forEach(function(a){a.classList.remove('active')});
  if(el)el.classList.add('active');
  var m=document.getElementById('mainContent');
  pageScrolls[currentPage]=window.pageYOffset||document.documentElement.scrollTop;
  if(id==='main')m.innerHTML=renderRoute('main');
  else if(id==='planB')m.innerHTML=renderRoute('planB');
  else if(id==='dirKowloon')m.innerHTML=renderDir(["金泰沙冰","彩虹","泰圆丰","隆姐泰国美食馆","BTS美食站","黄珍珍泰国菜馆","金宝泰国菜馆","昭拍耶","泰金国","泰发泰国餐厅","大和堂","南角","地茂馆甜品","合成糖水","清真牛肉馆","九龙寨城光影展","九龙寨城公园"],'九龙城店铺全览');
  else if(id==='dirShamshuipo')m.innerHTML=renderDir(["鸭寮街","合益泰小食","公和豆品厂","坤记糕品","汉发面家","文记车仔面","新香园坚记","Café Sausalito","顺流精品咖啡","文化屋杂货店","White Noise Records","阿里皮艺","DX设计馆","美荷楼","嘉顿山"],'深水埗店铺全览');
  else if(id==='dirSYP')m.innerHTML=renderDir(["艺里坊壁画街","西源里福德宫","东边街","正街","余乐里百年唐楼","NOC Coffee Co.","不籽是咖啡","Coffee by Zion","So High Coffee Bar","BakeOut 彼之丘","英记面家"],'西营盘景点全览');
  else if(id==='dirTKW')m.innerHTML=renderDir(["永香冰室","夕拾 Jiksap","牛棚艺术村","十三街","呼吸星球","海心公园"],'土瓜湾店铺全览');
  else if(id==='dirOther')m.innerHTML=renderDir(["土耳其餐廳","良记印尼","重庆大厦","新德里餐厅","K11 MUSEA","肥姐小食店","弥敦道金铺","中港城码头","港珠澳大桥口岸","德丰打冷","周记油渣面","捌哥捌哥","月桥正宗越南汤粉","苏山鸡饭","缘潮味"],'交通·晚餐');
  else if(id==='info')m.innerHTML=renderInfo();
  currentPage=id;
  setTimeout(function(){window.scrollTo(0,pageScrolls[id]||0);setTimeout(refreshAllChecks,100)},50);
  initGeo();
}

// Init
document.addEventListener("DOMContentLoaded",function(){try{switchPage('main',document.querySelector('nav a[href="#main"]'));}catch(e){console.log("init err:",e.message)}});
// Mobile nav collapse on scroll
(function(){var ls=0,mx=0,th=0,nav=null;function onScroll(){if(window._modalOpen)return;if(!nav)nav=document.querySelector('nav');if(!nav||window.innerWidth>768)return;var st=window.pageYOffset||document.documentElement.scrollTop;if(st===ls)return;if(st>mx)mx=st;ls=st;var now=Date.now();if(now-th<60)return;th=now;if(st<=20){nav.classList.remove('collapsed');mx=st}else if(st>60&&st>=mx-5){nav.classList.add('collapsed')}else if(st<mx-35){nav.classList.remove('collapsed');mx=st}}window.addEventListener('scroll',onScroll,{passive:true});window._resetScroll=function(){ls=0;mx=0}})();
